version: "3.9"

services:
  ollama:
    image: ollama/ollama:latest
    container_name: the-difference-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    restart: unless-stopped

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: the-difference-openwebui
    depends_on:
      - ollama
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
      WEBUI_AUTH: "False"
      DEFAULT_MODELS: qwen2.5:7b
    ports:
      - "3000:8080"
    volumes:
      - open-webui-data:/app/backend/data
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    container_name: the-difference-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-data:/qdrant/storage
    restart: unless-stopped

volumes:
  ollama-data:
  open-webui-data:
  qdrant-data:
